<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/Css/contactus.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="page">

        <div class="rift">
            <img src="/Multimedia/Imagess/kuyjf3vea2hg34taa-horizontal_default_slate_blue.svg" alt="MongoDB">
        </div>

        <div class="riftt">

            <div class="rift1">
                <h1>Sign up</h1>
                <p>See what Atlas is capable of for free</p>
            </div>

            <div class="rift2">
                <button class="google-btn">
                    <img src="/Multimedia/Imagess/sq-google-g-logo-update_dezeen_2364_col_0-removebg-preview.png">
                    Sign up with Google
                </button>
            </div>

            <div class="rift3">

                <div class="input-group">
                    <input type="text" required>
                    <label>First Name*</label>
                </div>

                <div class="input-group">
                    <input type="text" required>
                    <label>Last Name*</label>
                </div>

            </div>

            <div class="rift4">
                <div class="input-group">
                    <input type="text" required>
                    <label>Company</label>
                </div>
            </div>

            <div class="rift5">
                <div class="input-group">
                    <input type="email" required>
                    <label>Email*</label>
                </div>
            </div>

            <div class="rift6">
                <div class="input-group password">
                    <input type="password" required>
                    <label>Password*</label>
                    <span class="eye">👁</span>
                </div>
            </div>

            <div class="rift7">
                <input type="checkbox">
                <label>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            </div>

            <div class="rift8">
                <button class="create-btn">Create your Atlas account</button>
            </div>

            <div class="rift9">
                <a href="#">Sign in</a>
            </div>

        </div>

    </div>
    <div>
        <div class="footer">

            <div class="footer-copy">
                © 2026 MongoDB, Inc.
            </div>

            <div class="footer-links">
                <a href="#">Contact</a>
                <span>•</span>
                <a href="#">Privacy Policy</a>
                <span>•</span>
                <a href="#">Terms & Conditions</a>
            </div>

        </div>
    </div>
</body>

</html>
